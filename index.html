<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="WEBER PAPPDESIGN: handgefertigte Wellpappeboxen zur Aufbewahrung und Praesentation gerahmter Bilder.">
    <meta name="theme-color" content="#ffffff">
    <meta property="og:title" content="WEBER PAPPDESIGN">
    <meta property="og:description" content="Wellpappeboxen fuer gerahmte Bilder.">
    <meta property="og:type" content="website">
    <title>WEBER PAPPDESIGN</title>
    <script>
      try {
        if (localStorage.getItem("weberpappdesign:inverted") === "1") {
          document.documentElement.classList.add("is-inverted");
        }
      } catch (_) {}
    </script>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <button class="invert-toggle" type="button" aria-pressed="false" data-invert-toggle>Invertieren</button>

    <main class="site" aria-label="WEBER PAPPDESIGN">
      <h1 class="sr-only">WEBER PAPPDESIGN</h1>

      <div class="sequence">
        <figure class="media-block">
          <img class="media" src="assets/part-1.svg" width="800" height="800" alt="WEBER-Boxen: Produktansichten und Beschreibung der handgefertigten Wellpappeboxen.">
        </figure>

        <figure class="media-block">
          <video class="media" src="assets/part-2.mp4" width="684" height="432" controls playsinline preload="metadata" aria-label="Anwendungsvideo der WEBER-Boxen"></video>
        </figure>

        <figure class="media-block contact-sheet">
          <img class="media" src="assets/part-3.svg" width="800" height="600" alt="Standardformate, Preise und Kontakt fuer WEBER PAPPDESIGN.">
          <a class="email-link email-link-main" href="mailto:info@weberpappdesign.art" aria-label="E-Mail an info@weberpappdesign.art schreiben"></a>
          <a class="email-link email-link-footer" href="mailto:info@weberpappdesign.art" aria-label="E-Mail an info@weberpappdesign.art schreiben"></a>
        </figure>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
